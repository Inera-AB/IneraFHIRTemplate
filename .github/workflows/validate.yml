name: Validate FSH

on:
  push:
    branches-ignore:
      - main
  pull_request:

jobs:
  sushi:
    name: SUSHI validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install SUSHI
        run: npm install -g fsh-sushi

      - name: Run SUSHI
        run: sushi .

      - name: Upload SUSHI output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fsh-generated
          path: fsh-generated/
          retention-days: 7
